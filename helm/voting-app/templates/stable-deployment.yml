apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app-stable
  namespace: {{ .Values.namespace }}
  labels:
    app: voting-app
    track: stable
spec:
  replicas: {{ .Values.stable.replicaCount }}
  selector:
    matchLabels:
      app: voting-app
      track: stable
  template:
    metadata:
      labels:
        app: voting-app
        track: stable
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: voting-app
          image: {{ .Values.stable.image.repository }}:{{ .Values.stable.image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: REDIS
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PWD
              value: {{ .Values.redis.password | quote }}
            - name: VERSION
              value: {{ .Values.stable.version | quote }}
          resources:
            requests:
              cpu: {{ .Values.stable.resources.requests.cpu }}
              memory: {{ .Values.stable.resources.requests.memory }}
            limits:
              cpu: {{ .Values.stable.resources.limits.cpu }}
              memory: {{ .Values.stable.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3