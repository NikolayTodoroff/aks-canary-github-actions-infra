name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'helm/**'
  workflow_dispatch:
    inputs:
      deploy_prod_stable:
        description: 'Deploy stable to production'
        type: boolean
        default: false
      deploy_prod_canary:
        description: 'Deploy canary to production'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login (dev)
        run: az acr login --name acrakscanarydev

      - name: ACR Login (prod)
        run: az acr login --name acrakscanaryprod
     
      - name: Build and push image
        run: |
          docker build -t azure-vote-front:${{ github.sha }} app/

      - name: Tag and push to dev ACR
        run: |
          docker tag azure-vote-front:${{ github.sha }} acrakscanarydev.azurecr.io/azure-vote-front:${{ github.sha }}
          docker tag azure-vote-front:${{ github.sha }} acrakscanarydev.azurecr.io/azure-vote-front:latest

          docker push acrakscanarydev.azurecr.io/azure-vote-front:${{ github.sha }}
          docker push acrakscanarydev.azurecr.io/azure-vote-front:latest

      - name: Tag and push to prod ACR
        run: |
          docker tag azure-vote-front:${{ github.sha }} acrakscanaryprod.azurecr.io/azure-vote-front:${{ github.sha }}
          docker push acrakscanaryprod.azurecr.io/azure-vote-front:${{ github.sha }}

  deploy-dev:
    needs: build
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
      image-repository: acrakscanarydev.azurecr.io/azure-vote-front
      image-tag: ${{ needs.build.outputs.image-tag }}
      deployment-track: stable
    secrets:
      inherit

  deploy-prod-stable:
    needs: [build, deploy-dev]
    if: ${{ inputs.deploy_prod_stable }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: prod
      image-repository: acrakscanaryprod.azurecr.io/azure-vote-front
      image-tag: ${{ needs.build.outputs.image-tag }}
      deployment-track: stable
    secrets: inherit

  deploy-prod-canary:
    needs: [build, deploy-prod-stable]
    if: ${{ inputs.deploy_prod_canary }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: prod
      image-repository: acrakscanaryprod.azurecr.io/azure-vote-front
      image-tag: ${{ needs.build.outputs.image-tag }}
      deployment-track: canary
    secrets: inherit 